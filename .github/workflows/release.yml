name: publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-tauri:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify version consistency
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw
          $cargoVersion = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"([^"]+)"').Groups[1].Value

          if (-not $cargoVersion) {
            throw "Failed to read version from src-tauri/Cargo.toml"
          }

          if ($packageVersion -ne $cargoVersion -or $packageVersion -ne $tauriVersion) {
            throw "Version mismatch: package.json=$packageVersion, Cargo.toml=$cargoVersion, tauri.conf.json=$tauriVersion"
          }

      - name: Run type check
        run: npm run type-check

      - name: Build and publish desktop release
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          tagName: v__VERSION__
          releaseName: 萤火集桌面端 v__VERSION__
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
