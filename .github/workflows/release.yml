name: publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-tauri:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify version consistency
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargoToml = Get-Content src-tauri/Cargo.toml -Raw
          $cargoVersion = [regex]::Match($cargoToml, '(?m)^version\s*=\s*"([^"]+)"').Groups[1].Value

          if (-not $cargoVersion) {
            throw "Failed to read version from src-tauri/Cargo.toml"
          }

          if ($packageVersion -ne $cargoVersion -or $packageVersion -ne $tauriVersion) {
            throw "Version mismatch: package.json=$packageVersion, Cargo.toml=$cargoVersion, tauri.conf.json=$tauriVersion"
          }

      - name: Run type check
        run: npm run type-check

      - name: Build and publish desktop release
        id: tauri_release
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          tagName: v__VERSION__
          releaseName: 萤火集 v__VERSION__
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Generate updater latest.json
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.tauri_release.outputs.appVersion }}
        run: |
          $release = gh release view "v$env:VERSION" --repo $env:REPO --json body,publishedAt,assets | ConvertFrom-Json
          $installer = $release.assets | Where-Object { $_.name -match '\.exe$' } | Select-Object -First 1
          $signatureAsset = $release.assets | Where-Object { $_.name -match '\.sig$' } | Select-Object -First 1

          if (-not $installer) {
            throw "Release installer asset was not found."
          }

          if (-not $signatureAsset) {
            throw "Release signature asset was not found."
          }

          $downloadDir = Join-Path $env:RUNNER_TEMP 'updater-assets'
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          gh release download "v$env:VERSION" --repo $env:REPO --pattern $signatureAsset.name --dir $downloadDir --clobber

          $signaturePath = Join-Path $downloadDir $signatureAsset.name
          $signature = (Get-Content $signaturePath -Raw).Trim()

          $latestJson = @{
            version = $env:VERSION
            notes = if ([string]::IsNullOrWhiteSpace($release.body)) { "Release $($env:VERSION)" } else { $release.body.Trim() }
            pub_date = $release.publishedAt
            platforms = @{
              'windows-x86_64' = @{
                signature = $signature
                url = "https://github.com/$env:REPO/releases/download/v$env:VERSION/$($installer.name)"
              }
            }
          } | ConvertTo-Json -Depth 6

          $latestPath = Join-Path $env:RUNNER_TEMP 'latest.json'
          Set-Content -Path $latestPath -Value $latestJson -Encoding UTF8
          gh release upload "v$env:VERSION" $latestPath --repo $env:REPO --clobber
